<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#f8f5f2;
height:100vh;
overflow:hidden;
}

/* FADE ANIMATION */
.page{
opacity:0;
transition:opacity 0.6s ease;
display:none;
}

.page.active{
opacity:1;
}

/* LOGIN */
#loginPage{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.login-box{
background:white;
padding:35px;
border-radius:25px;
box-shadow:0 10px 30px rgba(0,0,0,.12);
width:320px;
text-align:center;
}

input{
width:100%;
padding:14px;
border:1px solid #ddd;
border-radius:12px;
margin-bottom:15px;
font-size:16px;
}

button{
padding:14px;
border:none;
border-radius:12px;
cursor:pointer;
font-size:16px;
background:#e8cfc5;
}

/* VOICE */
#voicePage{
height:100vh;
justify-content:center;
align-items:center;
flex-direction:column;
}

.voice-btn{
font-size:26px;
padding:20px 28px;
border-radius:50%;
background:#fff;
box-shadow:0 8px 20px rgba(0,0,0,0.15);
}

/* GALLERY */
#galleryPage{
height:100vh;
justify-content:center;
align-items:center;
flex-direction:column;
}

.image-container{
width:90%;
max-width:450px;
height:80vh;
display:flex;
justify-content:center;
align-items:center;
}

.image-container img{
width:100%;
height:100%;
object-fit:contain;
border-radius:20px;
box-shadow:0 8px 25px rgba(0,0,0,.15);
}

.controls{
margin-top:15px;
display:flex;
gap:15px;
}

.controls button{
width:60px;
height:50px;
font-size:22px;
}

.counter{
margin-top:10px;
font-size:18px;
}

/* FINAL */
#finalVoicePage{
height:100vh;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
padding:20px;
}

.final-message{
font-family:'Cairo', sans-serif;
font-size:20px;
line-height:1.8;
margin-bottom:25px;
max-width:500px;
}

.final-buttons button{
margin:10px;
padding:12px 20px;
border-radius:12px;
border:none;
cursor:pointer;
background:#e8cfc5;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="page active">
<div class="login-box">
<h2>Enter Password</h2>
<input type="password" id="password" placeholder="Password">
<button onclick="checkPassword()">Open</button>
<div class="error" id="error"></div>
</div>
</div>

<!-- VOICE -->
<div id="voicePage" class="page">
<h2>Tap to play</h2>

<button class="voice-btn" onclick="playVoice1()">▶</button>
</div>

<!-- GALLERY -->
<div id="galleryPage" class="page">

<div class="image-container">
<img id="galleryImage" src="1.jpg">
</div>

<div class="controls">
<button onclick="prevImage()">←</button>
<button onclick="nextImage()">→</button>
</div>

<div class="counter" id="counter">1 / 9</div>

</div>

<!-- FINAL -->
<div id="finalVoicePage" class="page">

<div class="final-message">
كل سنه وانتي طيبه يا حبيبتي ربنا يخليكي لينا يارب حاولنا نحضر حاجه تبسطك وتفرحك واتمنى انك تكوني فرحتي بحبك اوي...!
</div>

<div class="final-buttons">
<button onclick="backToPhotos()">⬅ Back to Photos</button>
<button onclick="startAgain()">🔄 Start Again</button>
</div>

</div>

<!-- AUDIO -->
<audio id="voice1" src="voice1.mp3"></audio>

<script>

const PASSWORD = "262002";

function showPage(id){
document.querySelectorAll('.page').forEach(p=>{
p.classList.remove('active');
p.style.display="none";
});

const page=document.getElementById(id);
page.style.display="flex";

setTimeout(()=>{
page.classList.add('active');
},50);
}

/* LOGIN */
function checkPassword(){
const pass = document.getElementById("password").value;

if(pass === PASSWORD){
showPage("voicePage");
}else{
document.getElementById("error").innerText="Wrong Password";
}
}

/* VOICE */
function playVoice1(){
document.getElementById("voice1").play();
}

/* NEXT AFTER CLICK BUTTON (NOT AUTO) */
document.querySelector(".voice-btn").addEventListener("click", function(){
showPage("galleryPage");
playVoice1();
});

/* IMAGES */
const images = [
"1.jpg","2.jpg","3.jpg","4.jpg","5.jpg",
"6.jpg","7.jpg","8.jpg","9.jpg"
];

let current = 0;

function updateImage(){
document.getElementById("galleryImage").src = images[current];
document.getElementById("counter").innerText = (current+1)+" / "+images.length;
}

function nextImage(){
if(current < images.length-1){
current++;
updateImage();
}else{
showPage("finalVoicePage");
}
}

function prevImage(){
if(current > 0){
current--;
updateImage();
}
}

/* FINAL */
function backToPhotos(){
showPage("galleryPage");
current = images.length - 1;
updateImage();
}

function startAgain(){
showPage("galleryPage");
current = 0;
updateImage();
}

</script>

</body>
</html>
